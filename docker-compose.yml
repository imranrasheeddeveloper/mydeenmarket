services:
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=mydeenmarket
      - POSTGRES_USER=mydeenmarket
      - POSTGRES_PASSWORD=mydeenmarket
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mydeenmarket -d mydeenmarket"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=change-this-to-a-secure-random-string
      - DATABASE_URL=postgresql://mydeenmarket:mydeenmarket@db:5432/mydeenmarket?schema=public
    volumes:
      - ./prisma:/app/prisma
    restart: unless-stopped

volumes:
  postgres-data:
